    <style>
        body { background-color: #0a1118; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4dd0e1; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(77, 208, 225, 0.5); margin-bottom: 5px; }
        
        .tabs-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .tab-btn { background: #1a2a36; color: #aaa; border: 1px solid #333; padding: 12px 25px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .tab-btn.active { background: rgba(77, 208, 225, 0.1); color: #4dd0e1; border-color: #4dd0e1; box-shadow: 0 0 15px rgba(77, 208, 225, 0.3); }

        .tab-content { display: none; width: 100%; max-width: 1200px; }
        .tab-content.active { display: flex; gap: 30px; align-items: stretch; }

        .lab-container { background: #1a2a36; padding: 25px; border-radius: 15px; border: 1px solid #4dd0e1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; max-height: 700px; overflow-y: auto; padding-right: 15px; }
        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #4dd0e1; border-radius: 4px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #4dd0e1; }
        .control-group.special-a { border-left: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }
        .control-group.special-b { border-left: 3px solid #80deea; background: rgba(128, 222, 234, 0.05); }
        .control-group.special-c { border-left: 3px solid #8A2BE2; background: rgba(138, 43, 226, 0.05); }
        .control-group.special-combo { border-left: 3px solid #ff5722; background: rgba(255, 87, 34, 0.05); }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        select, input[type="color"] { padding: 10px; background: #0d1a24; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        select:focus, input:focus { border-color: #4dd0e1; }
        
        .viewer-container { flex: 1.5; display: flex; flex-direction: column; gap: 15px; }
        .viewer { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #31c4d8; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px); border-radius: 10px; border: 2px solid #4dd0e1; min-height: 400px; position: relative; overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,0.2); }
        
        .pedestal-container { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 0; }
        .pedestal-ring { width: 220px; height: 50px; border: 1px dashed rgba(255, 255, 255, 0.7); border-radius: 50%; position: absolute; top: -120px; }
        .pedestal-light { width: 130px; height: 140px; background: linear-gradient(to top, rgba(255, 255, 255, 0.5), transparent); position: absolute; top: -100px; }
        .pedestal-shadow { width: 170px; height: 45px; background: #111b24; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; position: absolute; top: 25px; }
        .pedestal-core { width: 50px; height: 4px; background: #80deea; border-radius: 4px; box-shadow: 0 0 10px #80deea, 0 0 20px #80deea; }
        #geno-display { width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; z-index: 1; position: relative; margin-bottom: 60px; }

        .terminal { background: #0d161c; border: 1px solid #1e3a5f; border-left: 4px solid #00ffcc; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #00ffcc; height: 250px; overflow-y: auto; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); line-height: 1.6; }

        .fighter-svg { width: 200px; height: 200px; z-index: 1; margin-bottom: 10px; transition: 0.1s;}

        .switch-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }

        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ffcc00; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* ANIMACIÓN DE TEXTO FLOTANTE */
        @keyframes floatUpFade {

        }
        .floating-text {

            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 2px 2px 5px rgba(0,0,0,0.8);

        .text-crit { color: #ffcc00; font-size: 36px; font-style: italic; text-transform: uppercase; letter-spacing: 2px; }
        
        .ataques-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>

    <script>
        const elementosBase = ["Biomutante", "Viral", "Cibernético", "Radiactivo", "Tóxico", "Sintético"];

        function obtenerCalidad(stats, rareza) {
            const limites = window.TABLA_IVS && window.TABLA_IVS[rareza] ? window.TABLA_IVS[rareza] : { hp: [35, 55], atk: [10, 22], spd: [8, 25], luk: [5, 15] };
            let tMin = limites.hp[0] + limites.atk[0] + limites.spd[0] + limites.luk[0];
            let tMax = limites.hp[1] + limites.atk[1] + limites.spd[1] + limites.luk[1];
            let tObt = stats.hp + stats.atk + stats.spd + stats.luk;
            
            let pct = Math.round(((tObt - tMin) / (tMax - tMin)) * 100);
            if (pct > 100) pct = 100; if (pct < 0) pct = 0;
            
            let rango = "D"; let color = "#d9534f";
            if (pct >= 95) { rango = "S"; color = "#ffcc00"; }
            else if (pct >= 80) { rango = "A"; color = "#4dd0e1"; }
            else if (pct >= 50) { rango = "B"; color = "#4CAF50"; }
            else if (pct >= 20) { rango = "C"; color = "#f0ad4e"; }
            
            return { rango, pct, color };
        }

        function inyectarSvgSeguro(adnData) {
            if (typeof generarSvgGeno !== 'function') return '';
            let svgString = generarSvgGeno(adnData);
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = svgString;
            let svgEl = tempDiv.querySelector('svg');
            if (svgEl) {
                svgEl.setAttribute('width', '100%');
                svgEl.setAttribute('height', '100%');
                svgEl.setAttribute('viewBox', '-20 0 200 160');
                svgEl.style.overflow = 'visible';
            }
            return tempDiv.innerHTML;
        }

        function mostrarTextoFlotante(esJugador, texto, claseAdicional, delayMs = 0) {
            const sideId = esJugador ? "side-player" : "side-enemy";
            const sideEl = document.getElementById(sideId);
            if(!sideEl) return;
            setTimeout(() => {
                const floater = document.createElement("div");
                floater.className = `floating-text ${claseAdicional}`;
                floater.innerText = texto;
                const offsetX = (Math.random() - 0.5) * 140; 
                const offsetY = (Math.random() - 0.5) * 80;
                floater.style.top = `calc(35% + ${offsetY}px)`;
                floater.style.left = `calc(50% + ${offsetX}px)`;
                sideEl.appendChild(floater);
                setTimeout(() => floater.remove(), 1300);
            }, delayMs);
        }

        function rellenarAtaques() {
            const selEsp = document.getElementById("sel-mt-especial");
            const selTac = document.getElementById("sel-mt-tactica");
            const selDef = document.getElementById("sel-mt-definitivo");
            
            if (!window.AttackCatalog) {
                console.error("No se encontró el Catálogo de Ataques.");
                return;
            }

            let catalogoAUsar = window.AttackCatalog.ataquesPorElemento || window.AttackCatalog.movimientos;
            if (!catalogoAUsar) return;

            let esp = []; let tac = []; let def = [];
            for (let el in catalogoAUsar) {
                if (catalogoAUsar[el].especiales) catalogoAUsar[el].especiales.forEach(a => esp.push(`[${el}] ${a.nombre}`));
                if (catalogoAUsar[el].soportes) catalogoAUsar[el].soportes.forEach(a => tac.push(`[${el}] ${a.nombre}`));
                if (catalogoAUsar[el].definitivos) catalogoAUsar[el].definitivos.forEach(a => def.push(`[${el}] ${a.nombre}`));
            }

            esp.sort().forEach(name => { let opt = document.createElement("option"); opt.value = name.split("] ")[1]; opt.innerText = name; selEsp.appendChild(opt); });
            tac.sort().forEach(name => { let opt = document.createElement("option"); opt.value = name.split("] ")[1]; opt.innerText = name; selTac.appendChild(opt); });
            def.sort().forEach(name => { let opt = document.createElement("option"); opt.value = name.split("] ")[1]; opt.innerText = name; selDef.appendChild(opt); });
        }

        setTimeout(() => {
            rellenarAtaques();

            const btnAdn = document.getElementById("btn-tab-adn");
            const btnCombat = document.getElementById("btn-tab-combat");
            const tabAdn = document.getElementById("tab-adn");
            const tabCombat = document.getElementById("tab-combat");

            btnAdn.onclick = () => { btnAdn.classList.add("active"); btnCombat.classList.remove("active"); tabAdn.classList.add("active"); tabCombat.classList.remove("active"); };
            btnCombat.onclick = () => { btnCombat.classList.add("active"); btnAdn.classList.remove("active"); tabCombat.classList.add("active"); tabAdn.classList.remove("active"); };

            const selRareza = document.getElementById("sel-rareza");
            const selElemento = document.getElementById("sel-elemento");
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            const selGenA = document.getElementById("sel-gen-a");
            const selGenB = document.getElementById("sel-gen-b");
            const selGenC = document.getElementById("sel-gen-c");
            const chkEscaneado = document.getElementById("chk-escaneado");
            const selPlayerCombo = document.getElementById("sel-player-combo");
            const selEnemyCombo = document.getElementById("sel-enemy-combo");

            if (window.COMBOS_OFICIALES) {
                window.COMBOS_OFICIALES.forEach(combo => {
                    let opt1 = document.createElement("option"); opt1.value = combo.nombre; opt1.innerText = combo.nombre; selPlayerCombo.appendChild(opt1);
                    let opt2 = document.createElement("option"); opt2.value = combo.nombre; opt2.innerText = `Rival: ${combo.nombre}`; selEnemyCombo.appendChild(opt2);
                });
            }
            
            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];
            const opcionesOjos = typeof dicOjos !== 'undefined' ? Object.keys(dicOjos) : ["estandar", "cute", "angry"];
            const opcionesBocas = typeof dicBocas !== 'undefined' ? Object.keys(dicBocas) : ["estandar", "feliz", "colmillos"];
            const opcionesEspaldas = typeof dicAlas !== 'undefined' ? Object.keys(dicAlas) : ["ninguno"];
            const opcionesCabezas = typeof dicSombreros !== 'undefined' ? Object.keys(dicSombreros) : ["ninguno"];

            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option"); option.value = item;
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo); rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas); rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);
            selForma.value = formasCuerpo[Math.floor(Math.random() * formasCuerpo.length)];

            let todosLosGenes = [];
            let genesFuncionales = [];
            if (window.BASE_DATOS_GENES_V9) {
                for (let cat in window.BASE_DATOS_GENES_V9) {
                    window.BASE_DATOS_GENES_V9[cat].forEach(g => {
                        g.categoria = cat; todosLosGenes.push(g);
                        if (cat !== "cosmetico") genesFuncionales.push(g);
                    });
                }
            }

            const addGenesToSelect = (selectElement) => {
                selectElement.innerHTML = '<option value="ninguno">Ninguno (Vacío)</option>';
                genesFuncionales.forEach(g => {
                    let opt = document.createElement("option"); opt.value = g.id; opt.innerText = g.name; selectElement.appendChild(opt);
                });
            };
            addGenesToSelect(selGenB); addGenesToSelect(selGenC);

            selPlayerCombo.addEventListener("change", (e) => {
                if(e.target.value !== "ninguno" && window.COMBOS_OFICIALES) {
                    const combo = window.COMBOS_OFICIALES.find(c => c.nombre === e.target.value);
                    selGenB.value = combo.ids[0]; selGenC.value = combo.ids[1];
                }
                renderizarGenoPlayer();
            });

            function actualizarTerminal() {
                const term = document.getElementById("terminal-content");
                if (!chkEscaneado.checked) { term.innerHTML = `<div style="color:#ff6b6b">> ERROR: ADN BLOQUEADO. Active el escáner.</div>`; return; }

                let log = `<div style="color:#4dd0e1; margin-bottom: 10px;">> GENERANDO REPORTE DE ESTRATEGIA Y ADN...</div>`;
                
                const evaluarSlot = (id, nombreSlot, colorRGB) => {
                    if(id === "ninguno") return;
                    const gen = todosLosGenes.find(g => g.id === id);
                    if(gen) {
                        log += `<div style="color:${colorRGB}; margin-top:8px;">>>> ${nombreSlot}: [${gen.name.toUpperCase()}] <<<</div>`;
                        log += `&nbsp;&nbsp;<span style="color:#aaa">Efecto:</span> ${gen.desc}<br>`;
                    }
                };

                evaluarSlot(selGenA.value, "SLOT A (COSMÉTICO)", "#ffcc00");
                evaluarSlot(selGenB.value, "SLOT B (FUNCIONAL 1)", "#80deea");
                evaluarSlot(selGenC.value, "SLOT C (FUNCIONAL 2)", "#8A2BE2");
                term.innerHTML = log;
            }

            function obtenerAdnPlayer() {
                const rareza = selRareza.value;
                const stats = window.generarStatsPorRareza ? window.generarStatsPorRareza(rareza) : {hp: 100, atk: 25, def: 15, spd: 20, luk: 15};
                const genBData = selGenB.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenB.value) : null;
                const genCData = selGenC.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenC.value) : null;

                return {
                    id: 999, rarity: rareza, rareza: rareza, stats: stats, element: selElemento.value,
                    body_shape: selForma.value, base_color: selColor.value, color: selColor.value,
                    eye_type: selOjos.value, mouth_type: selBoca.value, wing_type: selEspalda.value, hat_type: selCabeza.value,
                    scanned: chkEscaneado.checked, level: parseInt(document.getElementById("sel-nivel-combate").value),
                    maxHp: stats.hp, hp: stats.hp,
                    hidden_genes: { A: selGenA.value !== "ninguno" ? { id: selGenA.value } : null, B: genBData, C: genCData }
                };
            }

            function renderizarGenoPlayer() {
                const adn = obtenerAdnPlayer();
                document.getElementById("geno-display").innerHTML = inyectarSvgSeguro(adn);
                document.getElementById("geno-display").style.color = selColor.value; 
                actualizarTerminal();
            }

            [selRareza, selElemento, selForma, selColor, selOjos, selBoca, selEspalda, selCabeza, selGenA, selGenB, selGenC, chkEscaneado].forEach(c => c.addEventListener("change", renderizarGenoPlayer));
            if (selColor) selColor.addEventListener("input", renderizarGenoPlayer);
            renderizarGenoPlayer();

            // ==========================================
            // CONEXIÓN CON EL MOTOR COLISEUMLOGIC (V14.8)
            // ==========================================
            const btnGenerarRival = document.getElementById("btn-generar-combate");
            const logCombate = document.getElementById("combat-log-content");
            const logContainer = document.getElementById("combat-log");
            const actionPanel = document.getElementById("action-panel");

            function scrollToBottom() { logContainer.scrollTop = logContainer.scrollHeight; }
            function addLog(text) { logCombate.innerHTML += `<div style="margin-bottom:4px;">${text}</div>`; scrollToBottom(); }

            function actualizarUICombate(p, esJugador) {
                const prefix = esJugador ? "c-p" : "c-e";
                document.getElementById(`${prefix}-atk`).innerText = `⚔️ ${p.atk}`;
                document.getElementById(`${prefix}-spd`).innerText = `⚡ ${p.spd}`;
                document.getElementById(`${prefix}-luk`).innerText = `🍀 ${p.luk}`;
                
                const hpPct = Math.max(0, (p.hp / p.maxHp) * 100);
                const fillBar = document.getElementById(`${prefix}-hp-fill`);
                fillBar.style.width = `${hpPct}%`;
                
                if (hpPct > 50) fillBar.style.background = "#4CAF50";
                else if (hpPct > 20) fillBar.style.background = "#ffeb3b";
                else fillBar.style.background = "#f44336";

                document.getElementById(`${prefix}-hp-text`).innerText = `HP: ${Math.floor(p.hp)} / ${p.maxHp}`;
                if (p.hp <= 0) {
                    document.getElementById(esJugador ? "side-player" : "side-enemy").style.filter = "grayscale(1) brightness(0.5)";
                    actionPanel.style.display = "none";
                }
            }

            function flashDamage(esJugador) {
                const el = document.getElementById(esJugador ? "combat-player-svg" : "combat-enemy-svg");
                el.classList.add("hit"); setTimeout(() => el.classList.remove("hit"), 150);
            }

            function actualizarBotonesHabilidades() {
                const p = window.ColiseumLogic.player;
                if (!p) return;

                ['ataque', 'especial', 'tactica', 'definitivo'].forEach((slot, idx) => {
                    const btn = document.getElementById(`btn-atk-${idx+1}`);
                    const ataque = p.ataquesEquipados[slot];
                    
                    if (!ataque) {
                        btn.innerText = "BLOQUEADO";
                        btn.disabled = true;
                        btn.style.opacity = "0.5";
                        return;
                    }

                    btn.style.opacity = "1";
                    let cd = p.cooldowns[slot] || 0;
                    
                    if (cd > 0) {
                        btn.innerText = `⏳ [CD: ${cd}]`;
                        btn.disabled = true;
                    } else {
                        btn.innerText = ataque.nombre.toUpperCase();
                        btn.disabled = false;
                        btn.onclick = () => resolverTurno(slot);
                    }
                });
            }

            btnGenerarRival.onclick = () => {
                logCombate.innerHTML = "";
                addLog(`<span style="color:#4dd0e1">> CONECTANDO CON TUS ATAQUES REALES...</span>`);
                
                document.getElementById("side-player").style.filter = "none";
                document.getElementById("side-enemy").style.filter = "none";

                const pAdn = obtenerAdnPlayer();
                
                const espVal = document.getElementById("sel-mt-especial").value;
                const tacVal = document.getElementById("sel-mt-tactica").value;
                const defVal = document.getElementById("sel-mt-definitivo").value;

                pAdn.ataques = {
                    atk_2: espVal !== "ninguno" ? { nombre: espVal } : window.ColiseumLogic.obtenerAtaqueAleatorio(pAdn.element, "especiales"),
                    atk_3: tacVal !== "ninguno" ? { nombre: tacVal } : window.ColiseumLogic.obtenerAtaqueAleatorio(pAdn.element, "soportes"),
                    atk_4: pAdn.level >= 25 ? (defVal !== "ninguno" ? { nombre: defVal } : window.ColiseumLogic.obtenerAtaqueAleatorio(pAdn.element, "definitivos")) : null
                };

                window.ColiseumLogic.prepararJugador(pAdn);

                const nivelElegido = parseInt(document.getElementById("sel-nivel-combate").value);
                window.ColiseumLogic.generarRivalProcedural(nivelElegido);

                const enemyRareza = document.getElementById("sel-enemy-rareza").value;
                const enemyComboSelection = document.getElementById("sel-enemy-combo").value;

                if (enemyRareza !== window.ColiseumLogic.enemy.rareza) {
                    window.ColiseumLogic.enemy.rareza = enemyRareza;
                    let nStats = window.generarStatsPorRareza(enemyRareza);
                    window.ColiseumLogic.enemy.maxHp = nStats.hp; window.ColiseumLogic.enemy.hp = nStats.hp;
                }

                const playerC = window.ColiseumLogic.player;
                const enemyC = window.ColiseumLogic.enemy;

                document.getElementById("combat-player-svg").innerHTML = inyectarSvgSeguro(playerC.adn);
                document.getElementById("combat-enemy-svg").innerHTML = inyectarSvgSeguro(enemyC.adn);

                document.getElementById("c-p-rareza").innerText = playerC.rareza;
                document.getElementById("c-p-elem").innerText = playerC.element;
                document.getElementById("c-e-rareza").innerText = enemyC.rareza;
                document.getElementById("c-e-elem").innerText = enemyC.element;

                let calP = obtenerCalidad(playerC.baseAtk ? {hp: playerC.maxHp, atk: playerC.baseAtk, def: playerC.baseDef, spd: playerC.baseSpd, luk: playerC.baseLuk} : pAdn.stats, playerC.rareza);
                document.getElementById("c-p-calidad").innerText = `[${calP.rango}]`;
                document.getElementById("c-p-calidad").style.color = calP.color;

                document.getElementById("c-p-genb").innerText = playerC.genesId[0] !== "ninguno" ? playerC.genesId[0] : "Vacío";
                document.getElementById("c-p-genc").innerText = playerC.genesId[1] !== "ninguno" ? playerC.genesId[1] : "Vacío";
                document.getElementById("c-e-genb").innerText = enemyC.genesId[0] !== "ninguno" ? enemyC.genesId[0] : "Vacío";
                document.getElementById("c-e-genc").innerText = enemyC.genesId[1] !== "ninguno" ? enemyC.genesId[1] : "Vacío";

                actualizarUICombate(playerC, true);
                actualizarUICombate(enemyC, false);

                actionPanel.style.display = "block";
                actualizarBotonesHabilidades();
                addLog(`<br><span style="color:#8A2BE2; font-weight:bold;">--- COMIENZA EL COMBATE (Turno 1) ---</span>`);
            };

            function resolverTurno(slotElegidoPorJugador) {
                const engine = window.ColiseumLogic;
                const p = engine.player;
                const e = engine.enemy;

                if (p.hp <= 0 || e.hp <= 0) return;

                for (let k in p.cooldowns) if (p.cooldowns[k] > 0) p.cooldowns[k]--;
                for (let k in e.cooldowns) if (e.cooldowns[k] > 0) e.cooldowns[k]--;

                let slotsEnemigos = ["ataque"];
                if (e.ataquesEquipados.especial && e.cooldowns.especial === 0) slotsEnemigos.push("especial");
                if (e.ataquesEquipados.tactica && e.cooldowns.tactica === 0) slotsEnemigos.push("tactica");
                if (e.ataquesEquipados.definitivo && e.cooldowns.definitivo === 0) slotsEnemigos.push("definitivo");
                
                let IA_Action = slotsEnemigos[Math.floor(Math.random() * slotsEnemigos.length)];

                addLog(`<br><span style="color:#fff; border-bottom:1px solid #333;">--- TURNO ${engine.turno} ---</span>`);

                let velP = p.spd + (Math.random() * 5);
                let velE = e.spd + (Math.random() * 5);
                
                let primero = velP >= velE ? {ata: p, def: e, accion: slotElegidoPorJugador, isP: true} : {ata: e, def: p, accion: IA_Action, isP: false};
                let segundo = velP < velE ? {ata: p, def: e, accion: slotElegidoPorJugador, isP: true} : {ata: e, def: p, accion: IA_Action, isP: false};

                let res1 = engine.ejecutarAtaqueCompleto(primero.ata, primero.def, primero.accion);
                res1.logs.forEach(l => addLog(l));
                if (res1.anims.danoDefensor > 0) { flashDamage(!primero.isP); mostrarTextoFlotante(!primero.isP, `-${res1.anims.danoDefensor}`, "text-dmg"); }
                if (res1.anims.curacionAtacante > 0) mostrarTextoFlotante(primero.isP, `+${res1.anims.curacionAtacante}`, "text-heal");
                if (res1.anims.critico) mostrarTextoFlotante(!primero.isP, "CRIT", "text-crit", 200);

                actualizarUICombate(p, true); actualizarUICombate(e, false);

                if (segundo.ata.hp > 0 && segundo.def.hp > 0) {
                    let res2 = engine.ejecutarAtaqueCompleto(segundo.ata, segundo.def, segundo.accion);
                    res2.logs.forEach(l => addLog(l));
                    if (res2.anims.danoDefensor > 0) { flashDamage(!segundo.isP); mostrarTextoFlotante(!segundo.isP, `-${res2.anims.danoDefensor}`, "text-dmg"); }
                    if (res2.anims.curacionAtacante > 0) mostrarTextoFlotante(segundo.isP, `+${res2.anims.curacionAtacante}`, "text-heal");
                    if (res2.anims.critico) mostrarTextoFlotante(!segundo.isP, "CRIT", "text-crit", 200);
                }

                let finP = engine.procesarEfectosFinTurno(p);
                finP.logs.forEach(l => addLog(l));
                if(finP.anims.heal > 0) mostrarTextoFlotante(true, `+${finP.anims.heal}`, "text-heal");
                if(finP.anims.dmg > 0) { mostrarTextoFlotante(true, `-${finP.anims.dmg}`, "text-dmg"); flashDamage(true); }

                let finE = engine.procesarEfectosFinTurno(e);
                finE.logs.forEach(l => addLog(l));
                if(finE.anims.heal > 0) mostrarTextoFlotante(false, `+${finE.anims.heal}`, "text-heal");
                if(finE.anims.dmg > 0) { mostrarTextoFlotante(false, `-${finE.anims.dmg}`, "text-dmg"); flashDamage(false); }

                actualizarUICombate(p, true); actualizarUICombate(e, false);
                
                engine.turno++;
                actualizarBotonesHabilidades();

                if (p.hp <= 0) addLog(`<br><span style="color:#ff0000; font-size:16px; font-weight:bold;">¡DERROTA CRÍTICA! Tu Geno ha caído.</span>`);
                else if (e.hp <= 0) addLog(`<br><span style="color:#4CAF50; font-size:16px; font-weight:bold;">¡VICTORIA! El rival ha sido destruido.</span>`);
            }
        }, 500);
    </script>
</body>
